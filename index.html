<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#3a3a52" />
    <meta name="description" content="Voxify - A real-time voice translator powered by Google Gemini AI" />
    <title>Voxify - Voice Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div class="app">
        <div class="app-content">

            <!-- ═══ Header ═══════════════════════════════════ -->
            <header class="header">
                <div class="header-brand">
                    <div class="header-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z" fill="currentColor"
                                opacity="0.3" />
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M12 19v4m-4 0h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div>
                        <div class="header-title">Voxify</div>
                        <div class="header-subtitle">Voice Translator</div>
                    </div>
                </div>
                <button class="header-settings" aria-label="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </button>
            </header>

            <!-- ═══ View: Language Setup ═════════════════════ -->
            <div id="viewSetup" class="view-setup">
                <div class="setup-intro">
                    <h2>Choose Two Languages</h2>
                    <p>Pick the two languages for your conversation. You can speak in either one.</p>
                </div>

                <div class="setup-dropdowns">
                    <div class="dropdown-group">
                        <label class="dropdown-label" for="langA">Language 1</label>
                        <div class="dropdown-wrap">
                            <select id="langA">
                                <option value="en" selected>English</option>
                                <option value="es">Spanish</option>
                                <option value="fr">French</option>
                                <option value="de">German</option>
                                <option value="it">Italian</option>
                                <option value="pt">Portuguese</option>
                                <option value="ja">Japanese</option>
                                <option value="ko">Korean</option>
                                <option value="zh">Chinese</option>
                                <option value="ar">Arabic</option>
                                <option value="hi">Hindi</option>
                                <option value="ru">Russian</option>
                            </select>
                            <div class="dropdown-chevron">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m6 9 6 6 6-6" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="setup-divider">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 3l4 4-4 4" />
                            <path d="M16 3l-4 4 4 4" />
                            <line x1="4" y1="21" x2="20" y2="21" />
                        </svg>
                    </div>

                    <div class="dropdown-group">
                        <label class="dropdown-label" for="langB">Language 2</label>
                        <div class="dropdown-wrap">
                            <select id="langB">
                                <option value="en">English</option>
                                <option value="es" selected>Spanish</option>
                                <option value="fr">French</option>
                                <option value="de">German</option>
                                <option value="it">Italian</option>
                                <option value="pt">Portuguese</option>
                                <option value="ja">Japanese</option>
                                <option value="ko">Korean</option>
                                <option value="zh">Chinese</option>
                                <option value="ar">Arabic</option>
                                <option value="hi">Hindi</option>
                                <option value="ru">Russian</option>
                            </select>
                            <div class="dropdown-chevron">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m6 9 6 6 6-6" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <p id="setupWarning" class="setup-warning hidden">Please select two different languages.</p>

                <button id="btnStart" class="btn-start">Start Translating</button>

                <p id="setupSummary" class="setup-summary">English &#8596; Spanish</p>
            </div>

            <!-- ═══ View: Active Translator ══════════════════ -->
            <div id="viewActive" class="view-active hidden">

                <!-- Conversation toggle -->
                <div class="toggle-wrap">
                    <button id="btnToggle" class="btn-toggle">
                        <div class="btn-toggle-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                                <line x1="12" x2="12" y1="19" y2="22" />
                            </svg>
                        </div>
                        <span class="btn-toggle-label" id="btnToggleLabel">Start Conversation</span>
                    </button>
                    <p class="toggle-pair" id="togglePair">English &#8596; Spanish</p>
                </div>

                <!-- Translation panels -->
                <div class="panels-wrap">
                    <div class="panels">
                        <div class="panel" id="panelSource">
                            <div class="panel-header">
                                <div class="panel-dot" id="dotSource"></div>
                                <span class="panel-label" id="labelSource">Source</span>
                            </div>
                            <div class="panel-body">
                                <p class="panel-text" id="textSource">Tap a language button to start</p>
                            </div>
                        </div>
                        <div class="panel" id="panelTarget">
                            <div class="panel-header">
                                <div class="panel-dot" id="dotTarget"></div>
                                <span class="panel-label" id="labelTarget">Translation</span>
                            </div>
                            <div class="panel-body">
                                <p class="panel-text" id="textTarget">Translated text appears here</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bottom bar -->
                <div class="bottom-bar">
                    <div class="bottom-bar-inner">
                        <button id="btnReset" class="btn-reset" aria-label="Change languages">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                                <path d="M21 3v5h-5" />
                                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                                <path d="M8 16H3v5" />
                            </svg>
                            <span class="btn-reset-text">Change Languages</span>
                        </button>

                        <div class="mic-indicator" aria-live="polite">
                            <div class="mic-ring-wrap">
                                <div class="mic-circle" id="micCircle">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                                        <line x1="12" x2="12" y1="19" y2="22" />
                                    </svg>
                                </div>
                                <div class="mic-ring-listening"></div>
                                <div class="mic-glow-outer"></div>
                                <div class="mic-glow-ping"></div>
                            </div>
                            <div class="audio-bars" id="audioBars">
                                <div class="audio-bar" style="--bar-speed:0.35s"></div>
                                <div class="audio-bar" style="--bar-speed:0.43s"></div>
                                <div class="audio-bar" style="--bar-speed:0.51s"></div>
                                <div class="audio-bar" style="--bar-speed:0.59s"></div>
                                <div class="audio-bar" style="--bar-speed:0.67s"></div>
                            </div>
                            <p class="mic-status" id="micStatus">Idle</p>
                        </div>

                        <div class="bottom-spacer"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
