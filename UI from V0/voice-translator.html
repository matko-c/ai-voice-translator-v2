<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3a3a52" />
  <title>Voxify - Voice Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ───────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #3b3b54;
      --bg-card: #45455e;
      --bg-secondary: #4e4e68;
      --fg: #f0f0f3;
      --fg-muted: #a3a3b8;
      --fg-dim: #7a7a92;
      --border: #5c5c76;
      --border-light: #50506a;
      --primary: #4ad2d2;
      --primary-fg: #1a1a2e;
      --primary-10: rgba(74, 210, 210, 0.10);
      --primary-15: rgba(74, 210, 210, 0.15);
      --primary-20: rgba(74, 210, 210, 0.20);
      --primary-30: rgba(74, 210, 210, 0.30);
      --primary-40: rgba(74, 210, 210, 0.40);
      --primary-06: rgba(74, 210, 210, 0.06);
      --primary-03: rgba(74, 210, 210, 0.03);
      --destructive: #e06050;
      --radius: 12px;
      --radius-lg: 16px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button { cursor: pointer; font-family: inherit; }
    select { font-family: inherit; }

    /* ─── App Shell ──────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    .app::before,
    .app::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .app::before {
      top: -20%;
      left: 20%;
      width: 500px;
      height: 500px;
      background: var(--primary-06);
      filter: blur(120px);
    }
    .app::after {
      bottom: -10%;
      right: 15%;
      width: 400px;
      height: 400px;
      background: var(--primary-03);
      filter: blur(100px);
    }

    .app-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ─── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(92, 92, 118, 0.4);
      background: rgba(69, 69, 94, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--primary-15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-icon svg { color: var(--primary); }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--fg);
      line-height: 1.2;
    }

    .header-subtitle {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--fg-muted);
      line-height: 1.2;
    }

    .header-settings {
      padding: 8px;
      border-radius: 8px;
      background: none;
      border: none;
      color: var(--fg-muted);
      transition: color 0.2s, background 0.2s;
    }
    .header-settings:hover {
      color: var(--fg);
      background: var(--bg-secondary);
    }

    /* ─── View: Language Setup ────────────────────────── */
    .view-setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 24px;
      gap: 40px;
    }

    .setup-intro { text-align: center; }

    .setup-intro h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .setup-intro p {
      font-size: 14px;
      color: var(--fg-muted);
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    .setup-dropdowns {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 460px;
    }

    .dropdown-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dropdown-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--fg-muted);
      text-align: center;
    }

    .dropdown-wrap {
      position: relative;
    }

    .dropdown-wrap select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(78, 78, 104, 0.7);
      border: 1px solid rgba(92, 92, 118, 0.6);
      border-radius: var(--radius);
      padding: 14px 40px 14px 16px;
      font-size: 16px;
      font-weight: 500;
      color: var(--fg);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .dropdown-wrap select:hover {
      background: var(--bg-secondary);
      border-color: var(--primary-40);
    }
    .dropdown-wrap select:focus {
      border-color: rgba(74, 210, 210, 0.5);
      box-shadow: 0 0 0 3px var(--primary-15);
    }
    .dropdown-wrap select option {
      background: var(--bg-card);
      color: var(--fg);
      padding: 8px 12px;
    }

    .dropdown-chevron {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--fg-muted);
    }

    .setup-divider {
      flex-shrink: 0;
      margin-top: 24px;
      color: var(--fg-dim);
      opacity: 0.5;
    }

    .setup-warning {
      font-size: 14px;
      color: var(--destructive);
      font-weight: 500;
    }

    .btn-start {
      padding: 14px 32px;
      border-radius: var(--radius);
      border: none;
      font-size: 16px;
      font-weight: 600;
      background: var(--primary);
      color: var(--primary-fg);
      box-shadow: 0 4px 24px rgba(74, 210, 210, 0.25);
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-start:hover { opacity: 0.9; }
    .btn-start:active { transform: scale(0.97); }
    .btn-start:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    .setup-summary {
      font-size: 12px;
      color: var(--fg-dim);
      opacity: 0.6;
    }

    /* ─── View: Active Translator ────────────────────── */
    .view-active {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* Language buttons row */
    .lang-buttons {
      display: flex;
      align-items: stretch;
      gap: 12px;
      padding: 16px 16px;
    }
    @media (min-width: 640px) {
      .lang-buttons { padding: 16px 24px; }
    }

    .lang-btn {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      background: rgba(78, 78, 104, 0.6);
      color: var(--fg);
      transition: all 0.3s ease;
      outline: none;
    }
    .lang-btn:hover {
      border-color: var(--primary-40);
      background: var(--bg-secondary);
    }
    .lang-btn:focus-visible {
      box-shadow: 0 0 0 4px var(--primary-30);
    }

    .lang-btn.active {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(74, 210, 210, 0.25);
      transform: scale(1.02);
    }

    .lang-btn-icon {
      transition: opacity 0.3s;
      opacity: 0.4;
    }
    .lang-btn.active .lang-btn-icon { opacity: 1; }
    .lang-btn.active .lang-btn-icon svg { fill: currentColor; }

    .lang-btn-name {
      font-size: 17px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      text-align: center;
    }
    @media (min-width: 640px) {
      .lang-btn-name { font-size: 18px; }
    }

    .lang-btn-hint {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: var(--fg-muted);
      transition: color 0.3s;
    }
    .lang-btn.active .lang-btn-hint {
      color: rgba(26, 26, 46, 0.75);
    }

    .lang-arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      gap: 4px;
      color: var(--fg-dim);
      opacity: 0.5;
    }

    /* Translation panels */
    .panels-wrap {
      flex: 1;
      min-height: 0;
      padding: 0 16px 12px;
      display: flex;
    }
    @media (min-width: 640px) {
      .panels-wrap { padding: 0 24px 12px; }
    }

    .panels {
      display: flex;
      gap: 12px;
      width: 100%;
      height: 100%;
    }

    .panel {
      flex: 1;
      min-width: 0;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      background: rgba(78, 78, 104, 0.2);
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.3s, background 0.3s;
    }
    @media (min-width: 640px) {
      .panel { padding: 20px; }
    }

    .panel.source-active {
      border-color: var(--primary-30);
      background: var(--primary-06);
    }
    .panel.target-active {
      border-color: var(--primary-20);
      background: var(--primary-03);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .panel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(122, 122, 146, 0.3);
      transition: background 0.3s;
    }
    .panel-dot.on { background: var(--primary); }
    .panel-dot.pulsing {
      background: var(--primary);
      animation: dotPulse 1.5s ease-in-out infinite;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--fg-muted);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb {
      background: rgba(92, 92, 118, 0.5);
      border-radius: 4px;
    }

    .panel-text {
      font-size: 16px;
      line-height: 1.55;
      color: rgba(240, 240, 243, 0.3);
      font-style: italic;
    }
    @media (min-width: 640px) {
      .panel-text { font-size: 18px; }
    }

    .panel-text.listening { color: rgba(240, 240, 243, 0.5); }

    /* ─── Bottom Bar ─────────────────────────────────── */
    .bottom-bar {
      flex-shrink: 0;
      border-top: 1px solid rgba(92, 92, 118, 0.3);
      background: rgba(69, 69, 94, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .bottom-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }
    @media (min-width: 640px) {
      .bottom-bar-inner { padding: 16px 24px; }
    }

    .btn-reset {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: none;
      font-size: 14px;
      color: var(--fg-muted);
      transition: color 0.2s, background 0.2s;
    }
    .btn-reset:hover {
      color: var(--fg);
      background: rgba(78, 78, 104, 0.6);
    }
    .btn-reset-text {
      display: none;
    }
    @media (min-width: 640px) {
      .btn-reset-text { display: inline; }
    }

    /* Mic indicator */
    .mic-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .mic-ring-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
    }

    .mic-circle {
      position: relative;
      z-index: 2;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(78, 78, 104, 0.7);
      border: 1px solid var(--border-light);
      color: var(--fg-muted);
      transition: all 0.5s ease;
    }

    .mic-circle.listening {
      background: var(--primary-20);
      border-color: var(--primary-30);
      color: var(--primary);
    }

    .mic-circle.hearing {
      background: var(--primary);
      border-color: transparent;
      color: var(--primary-fg);
      box-shadow: 0 0 24px rgba(74, 210, 210, 0.4);
    }

    /* Listening ring */
    .mic-ring-listening {
      display: none;
      position: absolute;
      z-index: 1;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(74, 210, 210, 0.25);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ringPulse 2s ease-in-out infinite;
    }
    .mic-circle.listening ~ .mic-ring-listening {
      display: block;
    }
    .mic-circle.hearing ~ .mic-ring-listening {
      display: none;
    }

    /* Hearing glow */
    .mic-glow-outer {
      display: none;
      position: absolute;
      z-index: 0;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary-10);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .mic-glow-ping {
      display: none;
      position: absolute;
      z-index: 0;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary-15);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    .mic-circle.hearing ~ .mic-glow-outer { display: block; }
    .mic-circle.hearing ~ .mic-glow-ping { display: block; }

    /* Audio bars */
    .audio-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
    }

    .audio-bar {
      width: 3px;
      border-radius: 3px;
      transition: all 0.2s ease;
      background: rgba(122, 122, 146, 0.2);
      height: 3px;
    }

    .audio-bar.listening {
      height: 4px;
      background: rgba(74, 210, 210, 0.25);
    }

    .audio-bar.hearing {
      background: var(--primary);
      animation: barPulse var(--bar-speed, 0.4s) ease-in-out infinite alternate;
    }

    .mic-status {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--fg-dim);
      opacity: 0.5;
      transition: color 0.3s, opacity 0.3s;
    }
    .mic-status.listening {
      color: var(--primary);
      opacity: 0.7;
    }
    .mic-status.hearing {
      color: var(--primary);
      opacity: 1;
    }

    /* Spacer to balance the bottom bar */
    .bottom-spacer {
      width: 120px;
    }
    @media (min-width: 640px) {
      .bottom-spacer { width: 160px; }
    }

    /* ─── Utility: Hidden ────────────────────────────── */
    .hidden { display: none !important; }

    /* ─── Animations ─────────────────────────────────── */
    @keyframes barPulse {
      0% { transform: scaleY(0.4); }
      100% { transform: scaleY(1); }
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    @keyframes ping {
      75%, 100% {
        transform: translate(-50%, -50%) scale(1.4);
        opacity: 0;
      }
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="app-content">

    <!-- ═══ Header ═══════════════════════════════════ -->
    <header class="header">
      <div class="header-brand">
        <div class="header-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z" fill="currentColor" opacity="0.3" />
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M12 19v4m-4 0h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div>
          <div class="header-title">Voxify</div>
          <div class="header-subtitle">Voice Translator</div>
        </div>
      </div>
      <button class="header-settings" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </header>

    <!-- ═══ View: Language Setup ═════════════════════ -->
    <div id="viewSetup" class="view-setup">
      <div class="setup-intro">
        <h2>Choose Two Languages</h2>
        <p>Pick the two languages for your conversation. You can speak in either one.</p>
      </div>

      <div class="setup-dropdowns">
        <div class="dropdown-group">
          <label class="dropdown-label" for="langA">Language 1</label>
          <div class="dropdown-wrap">
            <select id="langA">
              <option value="en" selected>English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
              <option value="zh">Chinese</option>
              <option value="ar">Arabic</option>
              <option value="hi">Hindi</option>
              <option value="ru">Russian</option>
            </select>
            <div class="dropdown-chevron">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
        </div>

        <div class="setup-divider">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3l4 4-4 4"/><path d="M16 3l-4 4 4 4"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
        </div>

        <div class="dropdown-group">
          <label class="dropdown-label" for="langB">Language 2</label>
          <div class="dropdown-wrap">
            <select id="langB">
              <option value="en">English</option>
              <option value="es" selected>Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
              <option value="zh">Chinese</option>
              <option value="ar">Arabic</option>
              <option value="hi">Hindi</option>
              <option value="ru">Russian</option>
            </select>
            <div class="dropdown-chevron">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
        </div>
      </div>

      <p id="setupWarning" class="setup-warning hidden">Please select two different languages.</p>

      <button id="btnStart" class="btn-start">Start Translating</button>

      <p id="setupSummary" class="setup-summary">English &#8596; Spanish</p>
    </div>

    <!-- ═══ View: Active Translator ══════════════════ -->
    <div id="viewActive" class="view-active hidden">

      <!-- Language buttons -->
      <div class="lang-buttons">
        <button id="btnLangA" class="lang-btn" aria-pressed="false">
          <div class="lang-btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
          </div>
          <span class="lang-btn-name" id="btnLangAName">English</span>
          <span class="lang-btn-hint">Tap to speak</span>
        </button>

        <div class="lang-arrows">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(180deg)"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </div>

        <button id="btnLangB" class="lang-btn" aria-pressed="false">
          <div class="lang-btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
          </div>
          <span class="lang-btn-name" id="btnLangBName">Spanish</span>
          <span class="lang-btn-hint">Tap to speak</span>
        </button>
      </div>

      <!-- Translation panels -->
      <div class="panels-wrap">
        <div class="panels">
          <div class="panel" id="panelSource">
            <div class="panel-header">
              <div class="panel-dot" id="dotSource"></div>
              <span class="panel-label" id="labelSource">Source</span>
            </div>
            <div class="panel-body">
              <p class="panel-text" id="textSource">Tap a language button to start</p>
            </div>
          </div>
          <div class="panel" id="panelTarget">
            <div class="panel-header">
              <div class="panel-dot" id="dotTarget"></div>
              <span class="panel-label" id="labelTarget">Translation</span>
            </div>
            <div class="panel-body">
              <p class="panel-text" id="textTarget">Translated text appears here</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="bottom-bar-inner">
          <button id="btnReset" class="btn-reset" aria-label="Change languages">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
            </svg>
            <span class="btn-reset-text">Change Languages</span>
          </button>

          <div class="mic-indicator" aria-live="polite">
            <div class="mic-ring-wrap">
              <div class="mic-circle" id="micCircle">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>
                </svg>
              </div>
              <div class="mic-ring-listening"></div>
              <div class="mic-glow-outer"></div>
              <div class="mic-glow-ping"></div>
            </div>
            <div class="audio-bars" id="audioBars">
              <div class="audio-bar" style="--bar-speed:0.35s"></div>
              <div class="audio-bar" style="--bar-speed:0.43s"></div>
              <div class="audio-bar" style="--bar-speed:0.51s"></div>
              <div class="audio-bar" style="--bar-speed:0.59s"></div>
              <div class="audio-bar" style="--bar-speed:0.67s"></div>
            </div>
            <p class="mic-status" id="micStatus">Idle</p>
          </div>

          <div class="bottom-spacer"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  /* ─── Language Map ───────────────────────────────── */
  const LANG_NAMES = {
    en: 'English', es: 'Spanish', fr: 'French', de: 'German',
    it: 'Italian', pt: 'Portuguese', ja: 'Japanese', ko: 'Korean',
    zh: 'Chinese', ar: 'Arabic', hi: 'Hindi', ru: 'Russian'
  };

  /* ─── DOM refs ──────────────────────────────────── */
  const $ = (id) => document.getElementById(id);
  const viewSetup  = $('viewSetup');
  const viewActive = $('viewActive');
  const selA = $('langA');
  const selB = $('langB');
  const btnStart    = $('btnStart');
  const warning     = $('setupWarning');
  const summary     = $('setupSummary');
  const btnLangA    = $('btnLangA');
  const btnLangB    = $('btnLangB');
  const btnLangAName = $('btnLangAName');
  const btnLangBName = $('btnLangBName');
  const panelSource = $('panelSource');
  const panelTarget = $('panelTarget');
  const dotSource   = $('dotSource');
  const dotTarget   = $('dotTarget');
  const labelSource = $('labelSource');
  const labelTarget = $('labelTarget');
  const textSource  = $('textSource');
  const textTarget  = $('textTarget');
  const micCircle   = $('micCircle');
  const audioBars   = $('audioBars');
  const micStatus   = $('micStatus');
  const btnReset    = $('btnReset');

  /* ─── State ─────────────────────────────────────── */
  let chosenA = 'en';
  let chosenB = 'es';
  let activeLang = null;   // null | 'a' | 'b'
  let state = 'idle';      // 'idle' | 'listening' | 'hearing'
  let hearingSim = null;    // interval id for demo hearing simulation

  /* ─── Setup View Logic ──────────────────────────── */
  function updateSetup() {
    chosenA = selA.value;
    chosenB = selB.value;
    const same = chosenA === chosenB;
    warning.classList.toggle('hidden', !same);
    btnStart.disabled = same;
    summary.textContent = LANG_NAMES[chosenA] + ' \u2194 ' + LANG_NAMES[chosenB];
  }

  selA.addEventListener('change', updateSetup);
  selB.addEventListener('change', updateSetup);

  btnStart.addEventListener('click', function () {
    if (chosenA === chosenB) return;
    viewSetup.classList.add('hidden');
    viewActive.classList.remove('hidden');
    btnLangAName.textContent = LANG_NAMES[chosenA];
    btnLangBName.textContent = LANG_NAMES[chosenB];
    resetActiveState();
  });

  /* ─── Active View Logic ─────────────────────────── */
  function setActiveState(newState) {
    state = newState;

    /* Mic circle */
    micCircle.className = 'mic-circle' + (state !== 'idle' ? ' ' + state : '');

    /* Audio bars */
    const bars = audioBars.querySelectorAll('.audio-bar');
    bars.forEach(function (bar, i) {
      bar.className = 'audio-bar' + (state !== 'idle' ? ' ' + state : '');
      if (state === 'hearing') {
        bar.style.height = (6 + Math.sin(i * 1.3) * 6 + 6) + 'px';
      } else if (state === 'listening') {
        bar.style.height = '4px';
      } else {
        bar.style.height = '3px';
      }
    });

    /* Status text */
    micStatus.className = 'mic-status' + (state !== 'idle' ? ' ' + state : '');
    micStatus.textContent = state === 'hearing' ? 'Hearing...' : state === 'listening' ? 'Listening...' : 'Idle';

    /* Panels */
    const isActive = state !== 'idle';
    panelSource.className = 'panel' + (isActive ? ' source-active' : '');
    panelTarget.className = 'panel' + (isActive ? ' target-active' : '');

    dotSource.className = 'panel-dot' + (isActive ? ' on' : '');
    dotTarget.className = 'panel-dot' + (state === 'hearing' ? ' pulsing' : '');

    if (activeLang === 'a') {
      labelSource.textContent = LANG_NAMES[chosenA];
      labelTarget.textContent = LANG_NAMES[chosenB];
    } else if (activeLang === 'b') {
      labelSource.textContent = LANG_NAMES[chosenB];
      labelTarget.textContent = LANG_NAMES[chosenA];
    } else {
      labelSource.textContent = 'Source';
      labelTarget.textContent = 'Translation';
    }

    textSource.className = 'panel-text' + (isActive ? ' listening' : '');
    textSource.textContent = isActive
      ? (state === 'hearing' ? 'Hearing speech...' : 'Listening... speak now')
      : 'Tap a language button to start';
    textTarget.textContent = isActive
      ? 'Translation will appear here...'
      : 'Translated text appears here';
  }

  function resetActiveState() {
    activeLang = null;
    btnLangA.classList.remove('active');
    btnLangB.classList.remove('active');
    btnLangA.setAttribute('aria-pressed', 'false');
    btnLangB.setAttribute('aria-pressed', 'false');
    btnLangA.querySelector('.lang-btn-hint').textContent = 'Tap to speak';
    btnLangB.querySelector('.lang-btn-hint').textContent = 'Tap to speak';
    clearHearingSim();
    setActiveState('idle');
  }

  function startListening(which) {
    activeLang = which;

    btnLangA.classList.toggle('active', which === 'a');
    btnLangB.classList.toggle('active', which === 'b');
    btnLangA.setAttribute('aria-pressed', String(which === 'a'));
    btnLangB.setAttribute('aria-pressed', String(which === 'b'));
    btnLangA.querySelector('.lang-btn-hint').textContent = which === 'a' ? 'Tap to stop' : 'Tap to speak';
    btnLangB.querySelector('.lang-btn-hint').textContent = which === 'b' ? 'Tap to stop' : 'Tap to speak';

    setActiveState('listening');
    startHearingSim();
  }

  btnLangA.addEventListener('click', function () {
    if (activeLang === 'a') {
      resetActiveState();
    } else {
      clearHearingSim();
      startListening('a');
    }
  });

  btnLangB.addEventListener('click', function () {
    if (activeLang === 'b') {
      resetActiveState();
    } else {
      clearHearingSim();
      startListening('b');
    }
  });

  btnReset.addEventListener('click', function () {
    resetActiveState();
    viewActive.classList.add('hidden');
    viewSetup.classList.remove('hidden');
  });

  /* ─── Simulated Hearing Pulses (demo only) ──────── */
  function startHearingSim() {
    clearHearingSim();
    hearingSim = setInterval(function () {
      if (state !== 'listening') return;
      setActiveState('hearing');
      setTimeout(function () {
        if (state === 'hearing') setActiveState('listening');
      }, 800 + Math.random() * 700);
    }, 2000 + Math.random() * 2000);
  }

  function clearHearingSim() {
    if (hearingSim) { clearInterval(hearingSim); hearingSim = null; }
  }
</script>

</body>
</html>
